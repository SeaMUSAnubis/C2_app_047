services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ueba
      POSTGRES_USER: ueba
      POSTGRES_PASSWORD: ueba
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ueba -d ueba"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ueba:ueba@db:5432/ueba
      MODEL_PATH: /app/Weight/ocsvm_cert_r42_chunked.joblib
      DATA_DIR: /app/Data/data_demo
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - d:/2 Code/TEAM_O47/Weight:/app/Weight
      - d:/2 Code/TEAM_O47/Data:/app/Data

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api


volumes:
  postgres_data:
